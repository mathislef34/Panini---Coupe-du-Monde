<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Album Virtuel - Coupe du Monde 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .oswald { font-family: 'Oswald', sans-serif; }

        /* Effet Holographique pour stickers FWC */
        .holographic {
            background: linear-gradient(135deg, #ff0080, #7928ca, #0070f3, #00dfd8);
            background-size: 400% 400%;
            animation: holo-anim 3s ease infinite;
            opacity: 0.8;
        }

        @keyframes holo-anim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Look sticker collé */
        .sticker-owned {
            transform: rotate(-0.5deg) scale(0.98);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.5);
            border: 2px solid #fbbf24 !important; /* Bordure dorée */
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        .pattern-bg {
            background-color: #0f172a;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shadow-2xl z-20">
        <div class="p-6 bg-slate-950 border-b border-slate-800">
            <h1 class="oswald text-2xl font-black italic tracking-tighter text-blue-500">WC2026 ALBUM</h1>
            <div class="flex gap-2 mt-4">
                <button onclick="exportData()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-[10px] py-1 rounded uppercase font-bold tracking-widest transition">Exporter</button>
                <button onclick="importData()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-[10px] py-1 rounded uppercase font-bold tracking-widest transition">Importer</button>
            </div>
        </div>
        
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto p-4 custom-scrollbar"></nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden pattern-bg">
        <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4 flex items-center justify-between z-10">
            <div class="flex-1 max-w-xl">
                <div class="flex justify-between mb-1 items-end">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Progression Mondiale</span>
                    <span id="global-progress-text" class="oswald text-xl font-bold text-blue-400">0 / 979</span>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden border border-slate-700">
                    <div id="global-progress-bar" class="bg-gradient-to-r from-blue-600 to-cyan-400 h-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
            <div class="ml-8 text-center bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-inner">
                <div id="global-percent" class="oswald text-3xl font-black text-white leading-none">0%</div>
                <div class="text-[10px] uppercase text-slate-500 font-bold mt-1">Complété</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 custom-scrollbar flex flex-col items-center">
            <div class="w-full max-w-7xl">
                <h2 id="section-title" class="oswald text-4xl font-black text-white mb-6 uppercase italic tracking-tighter text-center lg:text-left">
                    Chargement...
                </h2>
                
                <div id="album-book-view" class="w-full"></div>
            </div>
        </div>
    </main>

    <script>
        // --- DONNÉES ---
        const teams = ["MEX", "RSA", "KOR", "CZE", "CAN", "BIH", "QAT", "SUI", "BRA", "MAR", "HAI", "SCO", "USA", "PAR", "AUS", "TUR", "GER", "CUW", "CIV", "ECU", "NED", "JPN", "SWE", "TUN", "BEL", "EGY", "IRN", "NZL", "ESP", "CPV", "KSA", "URU", "FRA", "SEN", "IRQ", "NOR", "ARG", "ALG", "AUT", "JOR", "POR", "COD", "UZB", "COL", "ENG", "CRO", "GHA", "PAN"];
        
        const fwcSections = [
            { id: 'FWC_INTRO1', label: 'Introduction', slots: [1,2,3,4] },
            { id: 'FWC_INTRO2', label: 'Villes Hôtes', slots: [5,6,7,8] },
            { id: 'FWC_HIST1', label: 'Légendes I', slots: [9,10,11,12,13] },
            { id: 'FWC_HIST2', label: 'Légendes II', slots: [14,15,16,17,18,19] }
        ];

        let userAlbumData = JSON.parse(localStorage.getItem('wc2026_album')) || {};
        let currentSection = 'FWC_INTRO1';

        // --- LOGIQUE CORE ---

        function saveData() {
            localStorage.setItem('wc2026_album', JSON.stringify(userAlbumData));
            updateStats();
        }

        function toggleSticker(id) {
            userAlbumData[id] = !userAlbumData[id];
            saveData();
            renderMainContent();
            updateSidebarStats();
        }

        function updateStats() {
            const totalSlots = 19 + (48 * 20);
            const ownedCount = Object.values(userAlbumData).filter(v => v === true).length;
            const percent = Math.round((ownedCount / totalSlots) * 100);
            
            document.getElementById('global-progress-text').innerText = `${ownedCount} / ${totalSlots}`;
            document.getElementById('global-progress-bar').style.width = `${percent}%`;
            document.getElementById('global-percent').innerText = `${percent}%`;
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-nav');
            let html = `<p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Général</p>`;
            
            fwcSections.forEach(sec => {
                html += `<button onclick="changeSection('${sec.id}')" class="w-full text-left px-3 py-2 rounded-lg mb-1 text-sm font-medium hover:bg-blue-600/20 transition-colors flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span> ${sec.label}
                </button>`;
            });

            html += `<p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mt-8 mb-4">Équipes Qualifiées</p>`;
            teams.forEach(team => {
                html += `<button onclick="changeSection('${team}')" class="group w-full text-left px-3 py-2 rounded-lg mb-1 text-sm font-medium hover:bg-slate-800 transition-all flex justify-between items-center">
                    <span class="group-hover:text-blue-400 transition-colors">${team}</span>
                    <span id="side-stat-${team}" class="text-[10px] bg-slate-800 px-2 py-0.5 rounded border border-slate-700 text-slate-400">0/20</span>
                </button>`;
            });
            container.innerHTML = html;
            updateSidebarStats();
        }

        function updateSidebarStats() {
            teams.forEach(team => {
                let count = 0;
                for(let i=1; i<=20; i++) if(userAlbumData[`${team}-${i}`]) count++;
                const el = document.getElementById(`side-stat-${team}`);
                if(el) {
                    el.innerText = `${count}/20`;
                    if(count === 20) el.classList.add('bg-green-500/20', 'text-green-400', 'border-green-500/30');
                }
            });
        }

        window.changeSection = (id) => {
            currentSection = id;
            renderMainContent();
        }

        // Génère le conteneur de cellule de carte
        function createCardElement(id, isSpecial, numStr) {
            const owned = userAlbumData[id] || false;
            const card = document.createElement('div');
            const num = parseInt(numStr);
            
            let aspectClass = "aspect-[3/4]";
            let gridSpanClass = "";
            
            // Format Paysage pour la carte 13 (Nettoyé du padding qui la déformait)
            if (!isSpecial && num === 13) {
                aspectClass = "aspect-auto h-full"; // S'aligne parfaitement sur la hauteur de la ligne
                gridSpanClass = "col-span-2";
            }

            card.className = `${gridSpanClass} w-full h-full`;
            
            const innerCard = document.createElement('div');
            innerCard.className = `group relative w-full h-full ${aspectClass} rounded-xl border-2 cursor-pointer transition-all duration-300 flex items-center justify-center overflow-hidden
                ${owned ? 'sticker-owned border-transparent' : 'border-slate-800 bg-slate-900/40 hover:border-slate-600'}`;
            
            innerCard.onclick = () => toggleSticker(id);

            if (owned) {
                innerCard.innerHTML = `
                    <div class="absolute inset-0 ${isSpecial ? 'holographic' : 'bg-gradient-to-br from-blue-700 to-indigo-900'}"></div>
                    <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                    <span class="z-10 oswald text-3xl font-black italic text-white drop-shadow-lg group-hover:scale-110 transition-transform">${numStr}</span>
                    <div class="absolute top-2 left-2 text-[10px] font-bold text-white/50 z-10">${id.split('-')[0]}</div>
                `;
            } else {
                innerCard.innerHTML = `
                    <div class="text-center p-2 z-10">
                        <div class="oswald text-slate-600 text-2xl font-bold group-hover:text-slate-400 transition-colors">${numStr}</div>
                        <div class="text-[10px] text-slate-700 font-black tracking-wider uppercase">${id.split('-')[0]}</div>
                    </div>
                `;
            }
            
            card.appendChild(innerCard);
            return card;
        }

        function renderMainContent() {
            const bookContainer = document.getElementById('album-book-view');
            const title = document.getElementById('section-title');
            bookContainer.innerHTML = '';
            
            if (currentSection.startsWith('FWC')) {
                const sec = fwcSections.find(s => s.id === currentSection);
                title.innerText = sec.label;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 bg-slate-900/30 p-6 rounded-2xl border border-slate-800/60";
                
                sec.slots.forEach(n => {
                    const card = createCardElement(`FWC-${n}`, true, n.toString());
                    grid.appendChild(card);
                });
                bookContainer.appendChild(grid);
            } 
            else {
                title.innerText = `Équipe : ${currentSection}`;
                
                const bookLayout = document.createElement('div');
                bookLayout.className = "flex flex-col lg:flex-row gap-6 bg-slate-950/40 p-4 lg:p-8 rounded-3xl border border-slate-800/80 shadow-2xl backdrop-blur-sm relative";
                
                const spine = document.createElement('div');
                spine.className = "hidden lg:block absolute left-1/2 top-0 bottom-0 w-[2px] bg-gradient-to-b from-transparent via-slate-800 to-transparent transform -translate-x-1/2";
                bookLayout.appendChild(spine);

                // --- PAGE GAUCHE (1 à 10 avec décalage) ---
                const leftPage = document.createElement('div');
                leftPage.className = "flex-1 flex flex-col";
                leftPage.innerHTML = `<div class="oswald text-slate-500 font-bold tracking-widest text-xs mb-4 uppercase border-b border-slate-800/60 pb-2 flex justify-between"><span>Page Gauche</span> <span>${currentSection} 1-10</span></div>`;
                
                const leftGrid = document.createElement('div');
                leftGrid.className = "grid grid-cols-4 gap-3";
                
                // Insertion des 2 cellules vides de décalage
                const dummy1 = document.createElement('div');
                dummy1.className = "aspect-[3/4] pointer-events-none opacity-0 hidden sm:block";
                const dummy2 = document.createElement('div');
                dummy2.className = "aspect-[3/4] pointer-events-none opacity-0 hidden sm:block";
                leftGrid.appendChild(dummy1);
                leftGrid.appendChild(dummy2);
                
                for (let i = 1; i <= 10; i++) {
                    const card = createCardElement(`${currentSection}-${i}`, false, i.toString());
                    leftGrid.appendChild(card);
                }
                leftPage.appendChild(leftGrid);

                // --- PAGE DROITE (11 à 20) ---
                const rightPage = document.createElement('div');
                rightPage.className = "flex-1 flex flex-col mt-8 lg:mt-0";
                rightPage.innerHTML = `<div class="oswald text-slate-500 font-bold tracking-widest text-xs mb-4 uppercase border-b border-slate-800/60 pb-2 flex justify-between"><span>${currentSection} 11-20</span> <span>Page Droite</span></div>`;
                
                const rightGrid = document.createElement('div');
                rightGrid.className = "grid grid-cols-4 gap-3";
                
                // Remplissage classique des cartes 11 à 17
                for (let i = 11; i <= 17; i++) {
                    const card = createCardElement(`${currentSection}-${i}`, false, i.toString());
                    rightGrid.appendChild(card);
                }

                // AJOUT DU DÉCALAGE : Case vide (placeholder) pour pousser la ligne 18, 19, 20 d'un cran vers la droite
                const rowShiftDummy = document.createElement('div');
                rowShiftDummy.className = "aspect-[3/4] pointer-events-none opacity-0";
                rightGrid.appendChild(rowShiftDummy);

                // Remplissage des cartes restantes 18, 19, 20 après le décalage
                for (let i = 18; i <= 20; i++) {
                    const card = createCardElement(`${currentSection}-${i}`, false, i.toString());
                    rightGrid.appendChild(card);
                }
                
                rightPage.appendChild(rightGrid);

                bookLayout.appendChild(leftPage);
                bookLayout.appendChild(rightPage);
                bookContainer.appendChild(bookLayout);
            }
        }

        // --- FONCTIONS DE PARTAGE (SYNC MANUELLE) ---

        window.exportData = () => {
            const dataStr = btoa(JSON.stringify(userAlbumData));
            const tempInput = document.createElement('input');
            document.body.appendChild(tempInput);
            tempInput.value = dataStr;
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            alert("Code de collection copié dans le presse-papier ! Envoie-le à ton frère.");
        };

        window.importData = () => {
            const code = prompt("Colle ici le code de collection reçu :");
            if (code) {
                try {
                    const decoded = JSON.parse(atob(code));
                    if (confirm("Voulez-vous fusionner cette collection avec la vôtre ?")) {
                        userAlbumData = { ...userAlbumData, ...decoded };
                        saveData();
                        location.reload();
                    }
                } catch (e) {
                    alert("Code invalide !");
                }
            }
        };

        // Initialisation
        renderSidebar();
        renderMainContent();
        updateStats();

    </script>
</body>
</html>
